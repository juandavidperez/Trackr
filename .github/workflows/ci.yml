name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trackr_test
          POSTGRES_USER: trackr
          POSTGRES_PASSWORD: trackr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trackr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'
          cache: maven

      - name: Run tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/trackr_test
          SPRING_DATASOURCE_USERNAME: trackr
          SPRING_DATASOURCE_PASSWORD: trackr
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac-sha256
          CORS_ALLOWED_ORIGINS: http://localhost:4200
        run: ./mvnw test -B -q

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx ng test --watch=false
