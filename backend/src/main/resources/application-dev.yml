spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trackr}
    username: ${SPRING_DATASOURCE_USERNAME:trackr}
    password: ${SPRING_DATASOURCE_PASSWORD:trackr_dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
      additional-paths:
        - src/main/java

jwt:
  secret: ${JWT_SECRET:dev-secret-key-do-not-use-in-production-change-me}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
